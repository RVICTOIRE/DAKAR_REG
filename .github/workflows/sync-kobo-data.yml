name: 🔄 Synchroniser données Kobo

on:
  # Déclencher toutes les 12 heures
  schedule:
    - cron: '0 */12 * * *'  # À 00:00 et 12:00 UTC
  
  # Permettre de déclencher manuellement depuis GitHub UI
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: 📥 Cloner le repository
        uses: actions/checkout@v5
      
      - name: 🐍 Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
      
      - name: 📦 Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🗄️ Configurer la base de données
        env:
          DB_HOST: postgres
          DB_PORT: 5432
          DB_NAME: sonaged_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          echo "🗄️ Configuration de la base de données..."
          python setup_database.py
      
      - name: 🔗 Importer les données depuis Kobo API
        env:
          DB_HOST: postgres
          DB_PORT: 5432
          DB_NAME: sonaged_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          KOBO_API_KEY: ${{ secrets.KOBO_API_KEY }}
          KOBO_FORM_UID: ${{ secrets.KOBO_FORM_UID }}
        run: |
          echo "📊 Import depuis Kobo..."
          echo "DB_HOST: $DB_HOST"
          echo "DB_NAME: $DB_NAME"
          echo "KOBO_API_KEY défini: $(if [ -n "$KOBO_API_KEY" ]; then echo 'OUI'; else echo 'NON'; fi)"
          echo "KOBO_FORM_UID défini: $(if [ -n "$KOBO_FORM_UID" ]; then echo 'OUI'; else echo 'NON'; fi)"
          python import_kobo_via_api.py
      
      - name: 🔄 Transformer les données (RAW → MART)
        env:
          DB_HOST: postgres
          DB_PORT: 5432
          DB_NAME: sonaged_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          echo "🔄 Transformation en cours..."
          echo "DB_HOST: $DB_HOST"
          echo "DB_NAME: $DB_NAME"
          python transform_raw_to_mart.py
      
      - name: ✅ Succès - Données synchronisées
        if: success()
        run: |
          echo "🎉 Pipeline réussi: Kobo → RAW → MART"
          echo "$(date)" >> sync_log.txt
      
      - name: ❌ Erreur - Pipeline échoué
        if: failure()
        run: |
          echo "⚠️ Erreur lors de la synchronisation"
          exit 1
